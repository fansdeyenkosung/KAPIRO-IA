<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kapiro IA — Acceso</title>
  <link rel="icon" type="image/png" href="kapiro.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0810;
      --card: rgba(18, 10, 22, 0.94);
      --rose: #f0a8c8;
      --rose2: #e879a8;
      --rose3: rgba(240, 168, 200, 0.12);
      --violet: #c084fc;
      --violet2: rgba(192, 132, 252, 0.15);
      --gold: #f5d0a0;
      --tx: #f0e6f0;
      --txm: #7a5a7a;
      --txd: #3a2a3a;
      --err: #ff6b8a;
      --bd: rgba(240, 168, 200, 0.15);
      --bd2: rgba(240, 168, 200, 0.3);
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── GRADIENT BG ── */
    .bg-base {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%, rgba(192,132,252,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 90%, rgba(240,168,200,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(13,8,16,1) 0%, transparent 100%);
    }

    /* ── SOFT MESH ── */
    .bg-mesh {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.5;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(240,168,200,0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(192,132,252,0.06) 0%, transparent 40%),
        radial-gradient(circle at 60% 20%, rgba(245,208,160,0.04) 0%, transparent 30%);
    }

    /* ── FLOATING PETALS ── */
    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute;
      opacity: 0;
      animation: petalFall var(--dur) var(--delay) ease-in infinite;
    }
    .petal svg { display: block; }
    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.8); }
      10%  { opacity: 0.6; }
      85%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(105vh) rotate(var(--rot)) scale(0.5); }
    }

    /* ── AURORA ── */
    .aurora {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: linear-gradient(
        135deg,
        transparent 0%,
        rgba(192,132,252,0.03) 30%,
        rgba(240,168,200,0.04) 60%,
        transparent 100%
      );
      animation: auroraShift 10s ease-in-out infinite;
    }
    @keyframes auroraShift {
      0%, 100% { opacity: 0.5; transform: translateX(0) }
      50% { opacity: 1; transform: translateX(30px) }
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 2;
      width: 100%; max-width: 390px;
      padding: 48px 42px 40px;
      background: var(--card);
      border: 1px solid var(--bd2);
      border-radius: 32px;
      backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(240,168,200,0.05) inset,
        0 0 80px rgba(192,132,252,0.06) inset,
        0 40px 100px rgba(0,0,0,0.85),
        0 0 0 1px rgba(240,168,200,0.04);
      animation: cardRise 0.9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    /* Decorative top line */
    .card-topline {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose), var(--violet), transparent);
      border-radius: 1px;
    }

    /* Soft corner ornaments */
    .orn {
      position: absolute;
      width: 28px; height: 28px;
      opacity: 0.35;
    }
    .orn-tl { top: 14px; left: 14px; }
    .orn-tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .orn-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .orn-br { bottom: 14px; right: 14px; transform: scale(-1); }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 26px;
      animation: logoIn 1s cubic-bezier(.16,1,.3,1) 0.15s both;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.88); }
      to   { opacity: 1; transform: none; }
    }

    .logo-frame {
      position: relative; width: 92px; height: 92px; margin-bottom: 18px;
    }

    /* Outer soft glow rings */
    .logo-frame::before {
      content: '';
      position: absolute; inset: -12px; border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(240,168,200,0) 0%,
        rgba(240,168,200,0.5) 25%,
        rgba(192,132,252,0.5) 50%,
        rgba(245,208,160,0.4) 75%,
        rgba(240,168,200,0) 100%
      );
      animation: haloSpin 7s linear infinite;
      opacity: 0.5;
      border-radius: 50%;
    }
    .logo-frame::after {
      content: '';
      position: absolute; inset: -6px; border-radius: 50%;
      background: var(--bg);
    }
    @keyframes haloSpin { to { transform: rotate(360deg); } }

    .logo-img {
      position: relative; z-index: 2;
      width: 92px; height: 92px; border-radius: 50%; object-fit: cover;
      border: 1.5px solid rgba(240,168,200,0.5);
      box-shadow:
        0 0 20px rgba(240,168,200,0.2),
        0 0 40px rgba(192,132,252,0.1),
        0 8px 30px rgba(0,0,0,0.6);
      display: block;
    }
    .logo-fallback {
      position: relative; z-index: 2;
      width: 92px; height: 92px; border-radius: 50%;
      background: linear-gradient(135deg, #1a0a20, #2a1030);
      border: 1.5px solid rgba(240,168,200,0.5);
      box-shadow: 0 0 20px rgba(240,168,200,0.2), 0 8px 30px rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }

    /* Sparkle dot */
    .logo-spark {
      position: absolute; top: 2px; right: 5px; z-index: 3;
      font-size: 14px;
      animation: sparkle 2.5s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%,100%{transform:scale(1) rotate(0deg);opacity:0.8}
      50%{transform:scale(1.3) rotate(20deg);opacity:1}
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--rose) 0%, var(--violet) 50%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2px;
    }
    .brand-sub {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--txm); font-weight: 300;
    }

    /* ── HEADLINE ── */
    .headline {
      text-align: center; margin-bottom: 7px;
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) 0.28s both;
    }
    .headline h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 300; font-style: italic;
      color: var(--tx); line-height: 1.3; letter-spacing: 0.5px;
    }
    .headline h1 em {
      font-style: normal; font-weight: 600;
      background: linear-gradient(90deg, var(--rose), var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      text-align: center; font-size: 12px; color: var(--txm);
      line-height: 1.7; margin-bottom: 28px;
      font-family: 'DM Mono', monospace; font-weight: 300;
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) 0.34s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── ERROR ── */
    .err-box {
      display: none; align-items: center; gap: 10px;
      background: rgba(255,107,138,0.07); border: 1px solid rgba(255,107,138,0.2);
      border-radius: 12px; padding: 10px 14px;
      color: var(--err); font-size: 12px; margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    .err-box.show { display: flex; }

    /* ── GOOGLE BUTTON ── */
    .btn-g {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 15px 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,248,254,0.98));
      color: #1a0a20;
      border: none; border-radius: 16px;
      font-family: 'Jost', sans-serif; font-size: 14.5px; font-weight: 500;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      letter-spacing: .5px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(240,168,200,0.15);
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) 0.4s both;
    }
    .btn-g::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(240,168,200,0.12), rgba(192,132,252,0.1), transparent);
      opacity: 0; transition: opacity .25s;
    }
    .btn-g:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(240,168,200,0.2), 0 0 0 1px rgba(240,168,200,0.25); }
    .btn-g:hover::before { opacity: 1; }
    .btn-g:active { transform: translateY(0); }
    .btn-g.loading { pointer-events: none; }
    .btn-g .g-ic, .btn-g .g-lb { transition: opacity .2s; }
    .btn-g.loading .g-ic, .btn-g.loading .g-lb { opacity: 0; }
    .spinner {
      position: absolute; width: 18px; height: 18px;
      border: 2px solid rgba(26,10,32,0.12); border-top-color: #1a0a20;
      border-radius: 50%; opacity: 0;
      animation: spin .7s linear infinite; transition: opacity .2s;
    }
    .btn-g.loading .spinner { opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0 18px;
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) 0.46s both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--bd2), transparent);
    }
    .divider-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 2px; color: var(--txm);
      white-space: nowrap;
    }

    /* ── BADGES ── */
    .badges {
      display: flex; gap: 8px; flex-wrap: wrap;
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) 0.52s both;
    }
    .badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(240,168,200,0.04);
      border: 1px solid var(--bd);
      border-radius: 10px; padding: 7px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--txm); font-weight: 300;
      transition: all .2s;
    }
    .badge:hover {
      border-color: rgba(240,168,200,0.35);
      background: rgba(240,168,200,0.07);
      color: var(--rose);
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-rose  { background: var(--rose);   box-shadow: 0 0 6px var(--rose);   animation: blinkDot 2.5s infinite; }
    .dot-violet{ background: var(--violet); box-shadow: 0 0 6px var(--violet); animation: blinkDot 3s 0.5s infinite; }
    @keyframes blinkDot { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── FOOTER ── */
    .foot {
      margin-top: 26px; text-align: center;
      font-size: 10.5px; color: var(--txm); line-height: 2;
      font-family: 'DM Mono', monospace; font-weight: 300;
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) 0.58s both;
    }
    .foot strong {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 2px; font-weight: 600;
      background: linear-gradient(90deg, var(--rose), var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── TOP RIBBON ── */
    .ribbon {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 9px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,8,16,0.75);
      border-bottom: 1px solid rgba(240,168,200,0.08);
      backdrop-filter: blur(12px);
      animation: fadeDown 0.6s ease both;
    }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
    .ribbon-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-weight: 600; letter-spacing: 2px;
      color: var(--txm); text-transform: uppercase;
    }
    .ribbon-status {
      display: flex; align-items: center; gap: 7px;
      font-family: 'DM Mono', monospace; font-size: 9px; color: var(--txm);
    }
    .ribbon-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--rose); box-shadow: 0 0 8px var(--rose);
      animation: blinkDot 2s infinite;
    }

    @media (max-width: 440px) {
      .card { padding: 38px 26px 32px; border-radius: 26px; }
      .headline h1 { font-size: 22px; }
      .logo-img, .logo-fallback { width: 78px; height: 78px; }
      .logo-frame { width: 78px; height: 78px; }
      .brand-name { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Top ribbon -->
  <div class="ribbon">
    <span class="ribbon-brand">Kapiro IA</span>
    <div class="ribbon-status">
      <div class="ribbon-dot"></div>
      <span>en línea</span>
    </div>
  </div>

  <!-- Background -->
  <div class="bg-base"></div>
  <div class="bg-mesh"></div>
  <div class="aurora"></div>
  <div class="petals" id="petals"></div>

  <!-- Card -->
  <div class="card">
    <div class="card-topline"></div>

    <!-- Corner ornaments SVG -->
    <svg class="orn orn-tl" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14 C2 7 7 2 14 2" stroke="#f0a8c8" stroke-width="1.5" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#f0a8c8"/>
      <circle cx="14" cy="2" r="1" fill="#c084fc"/>
    </svg>
    <svg class="orn orn-tr" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14 C2 7 7 2 14 2" stroke="#f0a8c8" stroke-width="1.5" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#f0a8c8"/>
      <circle cx="14" cy="2" r="1" fill="#c084fc"/>
    </svg>
    <svg class="orn orn-bl" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14 C2 7 7 2 14 2" stroke="#f0a8c8" stroke-width="1.5" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#f0a8c8"/>
      <circle cx="14" cy="2" r="1" fill="#c084fc"/>
    </svg>
    <svg class="orn orn-br" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14 C2 7 7 2 14 2" stroke="#f0a8c8" stroke-width="1.5" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#f0a8c8"/>
      <circle cx="14" cy="2" r="1" fill="#c084fc"/>
    </svg>

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-frame">
        <img class="logo-img" src="kapiro.png" alt="Kapiro IA"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';"/>
        <div class="logo-fallback" id="logoFallback" style="display:none;">✨</div>
        <div class="logo-spark">✦</div>
      </div>
      <div class="brand-name">Kapiro IA</div>
      <div class="brand-sub">Asistente de inteligencia artificial</div>
    </div>

    <!-- Headline -->
    <div class="headline">
      <h1>Bienvenida, <em>querida.</em></h1>
    </div>
    <p class="sub">inicia sesión para continuar</p>

    <!-- Error -->
    <div class="err-box" id="errBox">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errMsg">Error al iniciar sesión.</span>
    </div>

    <!-- Google button -->
    <button class="btn-g" id="btnG" onclick="loginGoogle()">
      <svg class="g-ic" width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span class="g-lb">Continuar con Google</span>
      <div class="spinner"></div>
    </button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-label">✦ acceso seguro ✦</div>
    </div>

    <!-- Badges -->
    <div class="badges">
      <div class="badge"><div class="badge-dot dot-rose"></div>Cuentas autorizadas</div>
      <div class="badge"><div class="badge-dot dot-violet"></div>Firebase · Seguro</div>
    </div>

    <!-- Footer -->
    <div class="foot">
      © Yenko Huanaquiri Calderón<br/>
      <strong>Kapiro IA</strong>
    </div>
  </div>

  <script>
    // Floating petals
    const petalContainer = document.getElementById('petals');
    const colors = ['#f0a8c8','#c084fc','#f5d0a0','#e879a8','#d8b4fe'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 4 + Math.random() * 7;
      const rot = (Math.random() > 0.5 ? '' : '-') + (180 + Math.random() * 360) + 'deg';
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        top: -20px;
        --dur: ${8 + Math.random() * 14}s;
        --delay: -${Math.random() * 16}s;
        --rot: ${rot};
      `;
      el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 10 10" fill="${color}" opacity="${0.4 + Math.random()*0.4}">
        <ellipse cx="5" cy="5" rx="3" ry="5" transform="rotate(${Math.random()*360} 5 5)"/>
      </svg>`;
      petalContainer.appendChild(el);
    }

    // Extra sparkle dots
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 2 + Math.random() * 3;
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        top: -10px;
        --dur: ${6 + Math.random() * 10}s;
        --delay: -${Math.random() * 12}s;
        --rot: ${Math.random() * 360}deg;
      `;
      el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="${color}" opacity="${0.5 + Math.random()*0.4}"/></svg>`;
      petalContainer.appendChild(el);
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const auth = getAuth(initializeApp({
      apiKey: "AIzaSyAq8kWtjgTsCo396PEhdth8WEItBFi0pOM",
      authDomain: "kapiro.firebaseapp.com",
      projectId: "kapiro",
      storageBucket: "kapiro.firebasestorage.app",
      messagingSenderId: "261250743366",
      appId: "1:261250743366:web:0c6dd0bb1b1ef923529e47"
    }));
    const provider = new GoogleAuthProvider();

    window.loginGoogle = async () => {
      const btn = document.getElementById('btnG');
      const err = document.getElementById('errBox');
      err.classList.remove('show');
      btn.classList.add('loading');
      try {
        const r = await signInWithPopup(auth, provider);
        const u = r.user;
        localStorage.setItem("smi_auth_token", await u.getIdToken());
        localStorage.setItem("smi_user_name",  u.displayName || "Usuario");
        localStorage.setItem("smi_user_email", u.email || "");
        localStorage.setItem("smi_user_photo", u.photoURL || "");
        window.location.href = "index.html";
      } catch(e) {
        btn.classList.remove('loading');
        const msg = document.getElementById('errMsg');
        if (e.code === 'auth/popup-closed-by-user') msg.textContent = 'Cerraste la ventana antes de completar el login.';
        else if (e.code === 'auth/network-request-failed') msg.textContent = 'Error de red. Verifica tu conexión.';
        else msg.textContent = `Error: ${e.message}`;
        err.classList.add('show');
      }
    };

    onAuthStateChanged(auth, u => { if (u) window.location.href = "index.html"; });
  </script>
</body>
</html>
