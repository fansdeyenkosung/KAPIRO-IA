<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kapiro IA — Acceso</title>
  <link rel="icon" type="image/png" href="kapiro.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #030b0f;
      --card: rgba(3, 14, 20, 0.95);
      --cyan: #00e5ff;
      --cyan2: #00b8d4;
      --cyan3: rgba(0, 229, 255, 0.08);
      --green: #00ff88;
      --tx: #b8e8f0;
      --txm: #3a6a7a;
      --err: #ff4d6d;
      --bd: rgba(0, 229, 255, 0.15);
      --bd2: rgba(0, 229, 255, 0.32);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── GRID BG ── */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 72%);
    }

    /* ── CORNER GLOWS ── */
    .bg-glow-tl {
      position: fixed; top: -200px; left: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: driftTL 12s ease-in-out infinite;
    }
    .bg-glow-br {
      position: fixed; bottom: -200px; right: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: driftBR 14s ease-in-out infinite;
    }
    @keyframes driftTL { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,60px)} }
    @keyframes driftBR { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-60px)} }

    /* ── SCAN LINE ── */
    .scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,229,255,0.012) 3px, rgba(0,229,255,0.012) 4px
      );
    }

    /* ── PARTICLES ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: floatUp var(--dur) var(--delay) ease-in infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-110vh) scale(0.4); }
    }

    /* ── STATUS BAR ── */
    .status-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 8px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(0,229,255,0.07);
      background: rgba(3,11,15,0.8);
      backdrop-filter: blur(10px);
      animation: fadeDown 0.5s ease both;
    }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
    .status-bar-brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; letter-spacing: 3px; color: var(--txm); text-transform: uppercase;
    }
    .status-bar-right {
      display: flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--txm);
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: blinkDot 2s infinite;
    }
    @keyframes blinkDot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 2;
      width: 100%; max-width: 400px;
      padding: 44px 40px 38px;
      background: var(--card);
      border: 1px solid var(--bd2);
      border-radius: 24px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.06) inset,
        0 40px 80px rgba(0,0,0,0.9),
        0 0 60px rgba(0,229,255,0.04);
      animation: cardRise 0.8s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(36px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* Corner brackets */
    .corner { position: absolute; width: 20px; height: 20px; border-color: var(--cyan); border-style: solid; opacity: 0.45; }
    .c-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .c-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
    .c-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
    .c-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 28px;
      animation: logoIn 0.9s cubic-bezier(.16,1,.3,1) 0.1s both;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.8) translateY(-12px); }
      to   { opacity: 1; transform: none; }
    }

    .logo-ring-wrap {
      position: relative; width: 88px; height: 88px; margin-bottom: 16px;
    }
    .logo-ring-wrap::before {
      content: ''; position: absolute; inset: -10px; border-radius: 50%;
      border: 1.5px dashed rgba(0,229,255,0.35);
      animation: spinSlow 10s linear infinite;
    }
    .logo-ring-wrap::after {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 1px solid rgba(0,229,255,0.2);
      box-shadow: 0 0 20px rgba(0,229,255,0.15);
    }
    @keyframes spinSlow { to { transform: rotate(360deg); } }

    .logo-img {
      position: relative; z-index: 2;
      width: 88px; height: 88px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(0,229,255,0.4);
      box-shadow: 0 0 24px rgba(0,229,255,0.2), 0 8px 28px rgba(0,0,0,0.7);
      display: block;
    }
    .logo-fallback {
      position: relative; z-index: 2;
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #051520, #0a2535);
      border: 2px solid rgba(0,229,255,0.4);
      box-shadow: 0 0 24px rgba(0,229,255,0.2), 0 8px 28px rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; font-size: 30px;
    }
    .logo-pulse {
      position: absolute; bottom: 4px; right: 4px; z-index: 3;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--green); border: 2px solid var(--bg);
      box-shadow: 0 0 8px var(--green);
      animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%,100%{box-shadow:0 0 6px var(--green);transform:scale(1)}
      50%{box-shadow:0 0 14px var(--green);transform:scale(1.15)}
    }

    .brand-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 900; letter-spacing: 4px;
      color: var(--cyan); text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,229,255,0.4);
    }
    .brand-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--txm); font-weight: 400; margin-top: 4px;
    }

    /* ── HEADLINE ── */
    .headline {
      text-align: center; margin-bottom: 6px;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.25s both;
    }
    .headline h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px; font-weight: 300; color: var(--tx); letter-spacing: 0.5px;
    }
    .headline h1 strong {
      font-weight: 700; color: var(--cyan);
      text-shadow: 0 0 16px rgba(0,229,255,0.5);
    }
    .sub {
      text-align: center; font-size: 12px; color: var(--txm);
      line-height: 1.65; margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.3s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── ERROR ── */
    .err-box {
      display: none; align-items: center; gap: 10px;
      background: rgba(255,77,109,0.07); border: 1px solid rgba(255,77,109,0.2);
      border-radius: 10px; padding: 10px 14px;
      color: var(--err); font-size: 12px; margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    .err-box.show { display: flex; }

    /* ── GOOGLE BUTTON ── */
    .btn-g {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px;
      background: rgba(255,255,255,0.97); color: #111;
      border: none; border-radius: 12px;
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .18s, box-shadow .18s; letter-spacing: .3px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.38s both;
    }
    .btn-g::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,0.08), transparent 60%);
      opacity: 0; transition: opacity .2s;
    }
    .btn-g:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(0,229,255,0.25); }
    .btn-g:hover::after { opacity: 1; }
    .btn-g:active { transform: translateY(0); }
    .btn-g.loading { pointer-events: none; }
    .btn-g .g-ic, .btn-g .g-lb { transition: opacity .2s; }
    .btn-g.loading .g-ic, .btn-g.loading .g-lb { opacity: 0; }
    .spinner {
      position: absolute; width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.12); border-top-color: #111;
      border-radius: 50%; opacity: 0;
      animation: spin .7s linear infinite; transition: opacity .2s;
    }
    .btn-g.loading .spinner { opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0 16px;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.44s both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--bd2), transparent);
    }
    .divider-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; letter-spacing: 2.5px; color: var(--txm);
      text-transform: uppercase; white-space: nowrap;
    }

    /* ── BADGES ── */
    .badges {
      display: flex; gap: 8px; flex-wrap: wrap;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.5s both;
    }
    .badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(0,229,255,0.04); border: 1px solid var(--bd);
      border-radius: 8px; padding: 7px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; color: var(--txm);
      transition: border-color .2s, background .2s;
    }
    .badge:hover { border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.07); color: var(--tx); }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
      animation: blinkDot 2.5s ease-in-out infinite;
    }
    .dot-cyan { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ── FOOTER ── */
    .foot {
      margin-top: 24px; text-align: center;
      font-size: 10.5px; color: var(--txm); line-height: 1.9;
      font-family: 'JetBrains Mono', monospace;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.55s both;
    }
    .foot strong {
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2.5px;
      color: var(--cyan); text-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    @media (max-width: 440px) {
      .card { padding: 36px 26px 30px; border-radius: 20px; }
      .headline h1 { font-size: 19px; }
      .logo-img, .logo-fallback { width: 74px; height: 74px; }
      .logo-ring-wrap { width: 74px; height: 74px; }
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <span class="status-bar-brand">Kapiro IA</span>
    <div class="status-bar-right">
      <div class="status-dot"></div>
      <span>SISTEMA ACTIVO</span>
    </div>
  </div>

  <div class="bg-grid"></div>
  <div class="bg-glow-tl"></div>
  <div class="bg-glow-br"></div>
  <div class="scan"></div>
  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="logo-wrap">
      <div class="logo-ring-wrap">
        <img class="logo-img" src="kapiro.png" alt="Kapiro IA"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';"/>
        <div class="logo-fallback" id="logoFallback" style="display:none;">⚡</div>
        <div class="logo-pulse"></div>
      </div>
      <div class="brand-name">Kapiro IA</div>
      <div class="brand-sub">v2.0 · Sistema de IA</div>
    </div>

    <div class="headline">
      <h1>BIENVENIDO, <strong>USUARIO.</strong></h1>
    </div>
    <p class="sub">// autenticación requerida para acceder</p>

    <div class="err-box" id="errBox">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errMsg">Error al iniciar sesión.</span>
    </div>

    <button class="btn-g" id="btnG" onclick="loginGoogle()">
      <svg class="g-ic" width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span class="g-lb">Continuar con Google</span>
      <div class="spinner"></div>
    </button>

    <div class="divider">
      <div class="divider-label">◆ acceso seguro ◆</div>
    </div>

    <div class="badges">
      <div class="badge"><div class="badge-dot dot-cyan"></div>Cuentas autorizadas</div>
      <div class="badge"><div class="badge-dot dot-green"></div>Firebase · Seguro</div>
    </div>

    <div class="foot">
      © Yenko Huanaquiri Calderón<br/>
      <strong>KAPIRO.IA</strong>
    </div>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 1 + Math.random() * 2.5;
      const isCyan = Math.random() > 0.4;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        bottom: ${Math.random() * 15}%;
        width: ${size}px; height: ${size}px;
        background: ${isCyan ? '#00e5ff' : '#00ff88'};
        box-shadow: 0 0 ${size * 3}px ${isCyan ? '#00e5ff' : '#00ff88'};
        --dur: ${7 + Math.random() * 12}s;
        --delay: -${Math.random() * 12}s;
      `;
      container.appendChild(p);
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const auth = getAuth(initializeApp({
      apiKey: "AIzaSyC7iVtxb_TGJtjJp8FX1DRs-ESU-UQEc0M",
      authDomain: "agente-ia-a4ec5.firebaseapp.com",
      projectId: "agente-ia-a4ec5",
      storageBucket: "agente-ia-a4ec5.firebasestorage.app",
      messagingSenderId: "1025106952940",
      appId: "1:1025106952940:web:29f85856c368433245dbc9"
    }));
    const provider = new GoogleAuthProvider();

    window.loginGoogle = async () => {
      const btn = document.getElementById('btnG');
      const err = document.getElementById('errBox');
      err.classList.remove('show');
      btn.classList.add('loading');
      try {
        const r = await signInWithPopup(auth, provider);
        const u = r.user;
        localStorage.setItem("smi_auth_token", await u.getIdToken());
        localStorage.setItem("smi_user_name",  u.displayName || "Usuario");
        localStorage.setItem("smi_user_email", u.email || "");
        localStorage.setItem("smi_user_photo", u.photoURL || "");
        window.location.href = "index.html";
      } catch(e) {
        btn.classList.remove('loading');
        const msg = document.getElementById('errMsg');
        if (e.code === 'auth/popup-closed-by-user') msg.textContent = 'Cerraste la ventana antes de completar el login.';
        else if (e.code === 'auth/network-request-failed') msg.textContent = 'Error de red. Verifica tu conexión.';
        else msg.textContent = `Error: ${e.message}`;
        err.classList.add('show');
      }
    };

    onAuthStateChanged(auth, u => { if (u) window.location.href = "index.html"; });
  </script>
</body>
</html>
